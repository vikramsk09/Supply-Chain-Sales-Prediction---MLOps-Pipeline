version: "3.9"

services:
  supply_chain_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supply_chain_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    environment:
      - MODEL_PATH=/app/models/best_model.pkl
      - COLUMNS_PATH=/app/artifacts/columns.pkl
      - PREPROCESSOR_PATH=/app/artifacts/preprocessor.pkl
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns
    restart: unless-stopped

volumes:
  mlruns:
